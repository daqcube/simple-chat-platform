@if (activeRoom(); as room) {
  <div class="room">
    <header class="room-header">
      <div>
        <h3>{{ room.name }}</h3>

        <small>
          {{ roomUsers().length }} users online
        </small>
      </div>
    </header>

    <section class="room-messages">
      <app-message-list [messages]="chatMessages()"/>
    </section>

    <footer class="room-footer">
      <app-message-composer [room]="room" [username]="username()"
                            (send)="onSend($event)"/>
    </footer>

  </div>
} @else {
  <div class="empty-room">
    <h3>Select a room</h3>
    <p>Choose a room from the list to begin chatting.</p>
  </div>
}
