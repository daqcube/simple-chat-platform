<div class="chat-layout">

  <aside class="sidebar" aria-label="Chat rooms">
    <div class="sidebar-header">
      <h3>Chat Rooms</h3>
      <button
        type="button"
        class="leave-button"
        (click)="leavePlatForm()"
        aria-label="Logout from chat">
        Leave
      </button>

    </div>
    <app-room-list/>
  </aside>

  <main class="conversation">
    @if (chatState.activeRoom(); ) {
      <router-outlet></router-outlet>
    } @else {
      <div class="empty-state">
        <h3>Welcome </h3>
        <p>Select a chat room to start chatting.</p>
      </div>
    }
  </main>

  <aside class="users" aria-label="Chat room users">
    @if (chatState.activeRoom(); as room) {
      <app-room-users [roomId]="room.id"/>
    }

  </aside>

</div>
